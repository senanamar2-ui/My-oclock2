<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
  }
  
  .clock {
    width: 300px; 
    height: 300px;
    border-radius: 50%;
    position: relative;
    /* إدراج صورتك كخلفية للساعة */
    background-image: url('watch.jpg'); 
    background-size: cover;
    background-position: center;
  }
  
  .hand { 
    position: absolute; 
    bottom: 50%; 
    left: 50%; 
    transform-origin: bottom; 
    background: #fff; 
    border-radius: 3px; 
  }
  
  #hour { width: 6px; height: 75px; margin-left: -3px; }
  #minute { width: 4px; height: 110px; margin-left: -2px; }
  #second { width: 2px; height: 125px; margin-left: -1px; background: red; }
</style>
</head>
<body>

<div class="clock">
  <div id="hour" class="hand"></div>
  <div id="minute" class="hand"></div>
  <div id="second" class="hand"></div>
</div>

<script>
  function update() {
    const d = new Date();
    document.getElementById('second').style.transform = `rotate(${d.getSeconds() * 6}deg)`;
    document.getElementById('minute').style.transform = `rotate(${d.getMinutes() * 6}deg)`;
    document.getElementById('hour').style.transform = `rotate(${d.getHours() * 30 + d.getMinutes() / 2}deg)`;
  }
  setInterval(update, 1000);
  update();
</script>
</body>
</html>
